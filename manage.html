<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage quotes</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <p class="eyebrow">Admin</p>
  <h1>Manage quotes</h1>
  <input id="search" type="search" placeholder="Search quotes…" autocomplete="off" aria-label="Search quotes">
</header>

<main class="admin">
  <p id="count" class="count"></p>
  <div id="rows" class="manage-list"></div>
  <p id="empty" class="empty-msg" hidden>No quotes match your search.</p>

  <nav class="nav admin-nav">
    <a href="index.html">View quotes</a>
    <a href="add.html">Add a quote</a>
  </nav>
</main>

<script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.43/dist/flexsearch.bundle.min.js"></script>
<script src="search-index.js"></script>
<script src="api.js"></script>
<script src="manage.js"></script>

</body>
</html>
