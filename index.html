<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./quotes.js"></script>
<title>Quotes</title>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #0d0c0a; }
    ::selection { background: rgba(184,155,94,0.32); color: #f3eede; }
    @keyframes qFadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes qFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes qLine { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .q-search::placeholder { color: #6d685c; letter-spacing: 0.28em; }
    .q-search:focus { outline: none; border-color: rgba(184,155,94,0.55); box-shadow: 0 0 0 1px rgba(184,155,94,0.18), 0 0 42px -14px rgba(184,155,94,0.5); }
    .q-sort:hover { border-color: rgba(184,155,94,0.55) !important; background: rgba(184,155,94,0.1) !important; }

    /* floating clickable orbs */
    .orb { position: fixed; left: 0; top: 0; width: 44px; height: 44px; margin-left: -22px; margin-top: -22px; display: flex; align-items: center; justify-content: center; pointer-events: auto; cursor: pointer; will-change: transform; transition: opacity 0.4s ease; }
    .orb-core { width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle, #ffe9c2 0%, #d6b26c 55%, rgba(160,128,70,0) 100%); box-shadow: 0 0 14px 3px rgba(214,178,108,0.5); transition: box-shadow 0.45s ease; }
    .orb.is-hover .orb-core { box-shadow: 0 0 28px 8px rgba(232,202,134,0.9); }
    .orb-ring { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(214,178,108,0.55); opacity: 0; }
    .orb.is-hover .orb-ring { animation: orbPulse 1.5s ease-out infinite; }
    @keyframes orbPulse { 0% { transform: scale(0.45); opacity: 0.65; } 100% { transform: scale(2.5); opacity: 0; } }

    /* expanded quote card */
    .orb-backdrop { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 32px; background: rgba(9,8,6,0.72); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); transition: opacity 0.45s ease; }
    .orb-card { position: relative; max-width: 640px; width: 100%; box-sizing: border-box; padding: 66px 58px 50px; background: rgba(22,20,16,0.93); border: 1px solid rgba(184,155,94,0.28); border-radius: 12px; box-shadow: 0 40px 120px -30px rgba(0,0,0,0.8), 0 0 70px -22px rgba(184,155,94,0.4); text-align: center; transition: transform 0.62s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease; }
    .orb-q { margin: 0; max-width: 18ch; margin-left: auto; margin-right: auto; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: clamp(26px, 3.4vw, 40px); line-height: 1.26; letter-spacing: -0.005em; color: #ece7d9; text-wrap: balance; }
    .orb-author { margin-top: 32px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.34em; text-transform: uppercase; color: #b89b5e; }
    .orb-date { margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.34em; color: #5f5a50; }
    .orb-exit { position: absolute; top: 18px; right: 20px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; padding: 0; background: transparent; border: 1px solid rgba(184,155,94,0.3); border-radius: 50%; color: #b89b5e; font-size: 19px; line-height: 1; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: background 0.3s ease, border-color 0.3s ease, transform 0.4s cubic-bezier(0.16,1,0.3,1); }
    .orb-exit:hover { background: rgba(184,155,94,0.14); border-color: rgba(184,155,94,0.6); transform: rotate(90deg); }
  </style>
</helmet>

<div style="position: relative; min-height: 100vh; background: #0d0c0a; color: #ebe6d8; font-family: 'JetBrains Mono', monospace; overflow-x: hidden;">

  <canvas id="quote-bg" style="position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;"></canvas>
  <div id="orb-layer" style="position: fixed; inset: 0; z-index: 40; pointer-events: none; transition: opacity 0.3s ease;"></div>
  <div style="position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(125% 90% at 50% 28%, rgba(13,12,10,0) 38%, rgba(13,12,10,0.82) 100%);"></div>

  <main style="position: relative; z-index: 2; max-width: 1180px; margin: 0 auto; padding: 0 32px;">

    <!-- HERO -->
    <header style="min-height: 92vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; pointer-events: none;">
      <div style="opacity: 0; animation: qFadeIn 1.1s 0.15s ease forwards; font-size: 13px; letter-spacing: 0.46em; text-transform: uppercase; color: #b89b5e; padding-left: 0.46em;">A&nbsp;Curated&nbsp;Collection</div>

      <h1 style="opacity: 0; animation: qFadeUp 1.2s 0.32s cubic-bezier(0.16,1,0.3,1) forwards; margin: 30px 0 0; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: clamp(52px, 10vw, 132px); line-height: 0.98; letter-spacing: -0.01em; color: #f1ecdd; text-shadow: 0 1px 40px rgba(0,0,0,0.5);">Quotes worth keeping</h1>

      <div style="opacity: 0; animation: qFadeIn 1.3s 0.7s ease forwards; margin-top: 48px; display: flex; align-items: center; gap: 16px; font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: #837c6d; flex-wrap: wrap; justify-content: center; pointer-events: none;">
        <span>Every light holds a quote</span>
        <span style="width: 4px; height: 4px; border-radius: 50%; background: #b89b5e;"></span>
        <span>Click one to read</span>
      </div>

      <div style="opacity: 0; animation: qFadeIn 1.2s 1.2s ease forwards; margin-top: 78px; display: flex; flex-direction: column; align-items: center; gap: 12px; color: #5f5a50; pointer-events: none;">
        <span style="font-size: 11px; letter-spacing: 0.32em;">SCROLL FOR THE INDEX</span>
        <span style="display: block; width: 1px; height: 46px; background: linear-gradient(to bottom, rgba(184,155,94,0.55), transparent);"></span>
      </div>
    </header>

    <!-- CONTROLS (reveal on scroll) -->
    <div style="position: fixed; top: 0; left: 0; right: 0; z-index: 60; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 13px 22px; background: rgba(13,12,10,0.86); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid rgba(184,155,94,0.16); transition: transform 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease; transform: {{ barTransform }}; opacity: {{ barOpacity }}; pointer-events: {{ barPE }};">
      <input class="q-search" type="text" value="{{ query }}" onInput="{{ onSearch }}" placeholder="SEARCH QUOTES…" style="width: min(420px, 50vw); box-sizing: border-box; background: rgba(20,18,15,0.6); border: 1px solid rgba(184,155,94,0.2); border-radius: 5px; padding: 11px 18px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.16em; color: #ebe6d8; transition: border-color 0.4s ease, box-shadow 0.4s ease;" />
      <button onClick="{{ toggleOrder }}" class="q-sort" style="display: flex; align-items: center; gap: 9px; background: rgba(20,18,15,0.6); border: 1px solid rgba(184,155,94,0.2); border-radius: 5px; padding: 11px 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.2em; color: #b89b5e; cursor: pointer; white-space: nowrap; transition: border-color 0.4s ease, background 0.4s ease;">{{ orderLabel }}</button>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.24em; color: #5f5a50; padding-left: 2px; white-space: nowrap;">{{ count }} KEPT</div>
    </div>

    <!-- QUOTES -->
    <section style="padding: 96px 0 80px;">
      <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
        <div>
          <sc-for list="{{ quotes }}" as="quote" hint-placeholder-count="5">
            <article class="quote-item" style="opacity: 0.18; transition: opacity 0.45s ease, transform 0.45s ease; padding: 88px 0; border-top: 1px solid rgba(235,230,216,0.09); display: flex; flex-direction: column; align-items: center; text-align: center;">
              <blockquote style="margin: 0; max-width: 18ch; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: clamp(28px, 3.6vw, 50px); line-height: 1.22; letter-spacing: -0.005em; color: #ece7d9; text-wrap: balance;">"{{ quote.text }}"</blockquote>
              <sc-if value="{{ quote.author }}" hint-placeholder-val="">
                <div style="margin-top: 38px; font-size: 12px; letter-spacing: 0.34em; text-transform: uppercase; color: #b89b5e;">— {{ quote.author }}</div>
              </sc-if>
              <div style="margin-top: 18px; font-size: 11px; letter-spacing: 0.34em; color: #5f5a50;">{{ quote.date }}</div>
            </article>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ noResults }}" hint-placeholder-val="">
        <div style="padding: 140px 0; text-align: center; border-top: 1px solid rgba(235,230,216,0.09);">
          <div style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 34px; color: #6d685c;">Nothing kept under those words.</div>
          <div style="margin-top: 22px; font-size: 12px; letter-spacing: 0.3em; color: #4f4b43;">TRY ANOTHER SEARCH</div>
        </div>
      </sc-if>
    </section>

    <!-- FOOTER -->
    <footer style="position: relative; z-index: 2; padding: 70px 0 90px; border-top: 1px solid rgba(235,230,216,0.09); display: flex; flex-direction: column; align-items: center; gap: 14px;">
      <div style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: #b89b5e;">fin.</div>
    </footer>

  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: "", order: "desc", scrolled: false };

  quotes = (typeof QUOTES !== "undefined" ? QUOTES : []).map((q) => ({
    text: q.text, author: q.author, iso: q.dateAdded,
  }));

  fmt(iso) {
    const m = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    const p = (iso || "").split("-");
    if (p.length < 3) return "";
    return m[(+p[1]) - 1] + " " + p[2] + ", " + p[0];
  }

  renderVals() {
    const q = (this.state.query || "").trim().toLowerCase();
    const order = this.state.order || "desc";
    let list = this.quotes.map((x) => ({
      text: x.text, author: x.author, date: this.fmt(x.iso), _ts: Date.parse(x.iso),
    }));
    if (q) list = list.filter((x) => (x.text + " " + (x.author || "")).toLowerCase().includes(q));
    list.sort((a, b) => (order === "desc" ? b._ts - a._ts : a._ts - b._ts));
    const visible = !!this.state.scrolled;
    return {
      quotes: list,
      count: list.length,
      hasResults: list.length > 0,
      noResults: list.length === 0,
      query: this.state.query || "",
      onSearch: (e) => this.setState({ query: e.target.value }),
      toggleOrder: () => this.setState((s) => ({ order: s.order === "asc" ? "desc" : "asc" })),
      orderLabel: order === "desc" ? "\u2193 NEWEST FIRST" : "\u2191 OLDEST FIRST",
      barTransform: visible ? "translateY(0)" : "translateY(-110%)",
      barOpacity: visible ? "1" : "0",
      barPE: visible ? "auto" : "none",
    };
  }

  componentDidMount() {
    this.initThree();
    this.initOrbs();
    this.bindScroll();
    // run focus pass after fonts/layout settle
    this._k1 = setTimeout(() => this.applyFocus(), 60);
    this._k2 = setTimeout(() => this.applyFocus(), 600);
  }

  componentDidUpdate() {
    this.applyFocus();
  }

  componentWillUnmount() {
    cancelAnimationFrame(this._raf);
    cancelAnimationFrame(this._orbRaf);
    clearTimeout(this._poll);
    clearTimeout(this._orbPoll);
    clearTimeout(this._k1);
    clearTimeout(this._k2);
    window.removeEventListener("scroll", this._onScroll);
    window.removeEventListener("resize", this._onScroll);
    window.removeEventListener("resize", this._onResize);
    window.removeEventListener("pointermove", this._onMove);
    if (this._dragHandlers) {
      window.removeEventListener("pointerdown", this._dragHandlers.onDown);
      window.removeEventListener("pointermove", this._dragHandlers.onMove);
      window.removeEventListener("pointerup", this._dragHandlers.onUp);
    }
    document.body.style.cursor = "";
    if (this._escHandler) window.removeEventListener("keydown", this._escHandler);
    if (this._backdrop && this._backdrop.parentNode) this._backdrop.parentNode.removeChild(this._backdrop);
    if (this._orbs) this._orbs.forEach((o) => { if (o.el.parentNode) o.el.parentNode.removeChild(o.el); });
  }

  // ---- floating, clickable quote orbs (drift upward like the dust) ----
  initOrbs() {
    const layer = document.getElementById("orb-layer");
    if (!layer) { this._orbPoll = setTimeout(() => this.initOrbs(), 140); return; }
    if (this._orbs) return;
    const qs = this.quotes;
    const N = Math.min(20, qs.length);
    const W = window.innerWidth, H = window.innerHeight;
    const orbs = [];
    for (let i = 0; i < N; i++) {
      const el = document.createElement("div");
      el.className = "orb";
      const ring = document.createElement("div"); ring.className = "orb-ring";
      const core = document.createElement("div"); core.className = "orb-core";
      core.style.transform = "scale(" + (0.72 + Math.random() * 0.85).toFixed(2) + ")";
      el.style.transform = "translate(-9999px,-9999px)";
      const baseOp = (0.6 + Math.random() * 0.4).toFixed(2);
      el.style.opacity = baseOp;
      el.appendChild(ring); el.appendChild(core);
      const o = {
        el, quote: qs[i], baseOp,
        sx: Math.random() * W,
        sy: (i / N) * (H + 120) - 60 + Math.random() * 80,
        vy: 10 + Math.random() * 24,
        sway: 6 + Math.random() * 12,
        spd: 0.15 + Math.random() * 0.35,
        ph: Math.random() * 6.28,
        hover: false, cur: 1, frozen: false,
      };
      el.__orb = o;
      el.addEventListener("pointerenter", () => { o.hover = true; el.classList.add("is-hover"); });
      el.addEventListener("pointerleave", () => { o.hover = false; el.classList.remove("is-hover"); });
      el.addEventListener("click", (e) => { e.stopPropagation(); this.expandOrb(o); });
      layer.appendChild(el);
      orbs.push(o);
    }
    this._orbs = orbs;
    // next quote to surface as orbs cycle off the top; first N are already shown
    this._qIdx = N;

    let last = performance.now();
    const loop = (now) => {
      const dt = Math.min((now - last) / 1000, 0.05); last = now;
      const t = now * 0.001;
      const W2 = window.innerWidth, H2 = window.innerHeight;
      for (const o of orbs) {
        if (!o.frozen) {
          o.sy -= o.vy * dt;
          o.sx += Math.sin(t * o.spd + o.ph) * o.sway * dt;
          if (o.sy < -50) {
            // recycle from the bottom carrying the next quote in the array
            o.sy = H2 + 50;
            o.sx = Math.random() * W2;
            o.quote = qs[this._qIdx % qs.length];
            this._qIdx++;
          }
          if (o.sx < -50) o.sx = W2 + 50;
          if (o.sx > W2 + 50) o.sx = -50;
        }
        const target = o.hover ? 1.55 : 1;
        o.cur += (target - o.cur) * 0.15;
        o.el.style.transform = "translate(" + o.sx.toFixed(1) + "px," + o.sy.toFixed(1) + "px) scale(" + o.cur.toFixed(3) + ")";
      }
      this._orbRaf = requestAnimationFrame(loop);
    };
    this._orbRaf = requestAnimationFrame(loop);
  }

  expandOrb(o) {
    if (this._openOrb) this.collapseOrb(true);
    o.frozen = true;
    o.hover = false; o.el.classList.remove("is-hover");
    o.el.style.opacity = "0";
    this._openOrb = o;
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    const q = o.quote;

    const bd = document.createElement("div");
    bd.className = "orb-backdrop";
    bd.addEventListener("click", () => this.collapseOrb());

    const card = document.createElement("div");
    card.className = "orb-card";
    card.addEventListener("click", (e) => e.stopPropagation());
    const exit = document.createElement("button");
    exit.className = "orb-exit"; exit.setAttribute("aria-label", "Close"); exit.textContent = "\u00d7";
    exit.addEventListener("click", () => this.collapseOrb());
    const bq = document.createElement("blockquote");
    bq.className = "orb-q"; bq.textContent = '"' + q.text + '"';
    card.appendChild(exit); card.appendChild(bq);
    if (q.author) { const a = document.createElement("div"); a.className = "orb-author"; a.textContent = "\u2014 " + q.author; card.appendChild(a); }
    const d = document.createElement("div"); d.className = "orb-date"; d.textContent = this.fmt(q.iso); card.appendChild(d);
    bd.appendChild(card);
    document.body.appendChild(bd);
    this._backdrop = bd; this._card = card;

    bd.style.opacity = "0";
    card.style.transform = "translate(" + (o.sx - cx) + "px," + (o.sy - cy) + "px) scale(0.2)";
    card.style.opacity = "0";
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bd.style.opacity = "1";
      card.style.transform = "translate(0px,0px) scale(1)";
      card.style.opacity = "1";
    }));

    this._escHandler = (e) => { if (e.key === "Escape") this.collapseOrb(); };
    window.addEventListener("keydown", this._escHandler);
  }

  collapseOrb(immediate) {
    const o = this._openOrb, bd = this._backdrop, card = this._card;
    if (!o) return;
    if (this._escHandler) { window.removeEventListener("keydown", this._escHandler); this._escHandler = null; }
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    if (card) {
      card.style.transform = "translate(" + (o.sx - cx) + "px," + (o.sy - cy) + "px) scale(0.2)";
      card.style.opacity = "0";
    }
    if (bd) bd.style.opacity = "0";
    const finish = () => {
      if (bd && bd.parentNode) bd.parentNode.removeChild(bd);
      o.frozen = false;
      o.el.style.opacity = o.baseOp || "1";
    };
    if (immediate) finish(); else setTimeout(finish, 540);
    this._openOrb = null; this._backdrop = null; this._card = null;
  }

  // ---- scroll spotlight ----
  bindScroll() {
    let ticking = false;
    this._onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => { this.applyFocus(); this.updateScrolled(); ticking = false; });
    };
    window.addEventListener("scroll", this._onScroll, { passive: true });
    window.addEventListener("resize", this._onScroll, { passive: true });
  }

  updateScrolled() {
    const vh = window.innerHeight;
    const sy = window.scrollY || document.documentElement.scrollTop || 0;
    const s = sy > vh * 0.5;
    if (s !== this.state.scrolled) this.setState({ scrolled: s });
  }

  applyFocus() {
    const vh = window.innerHeight;
    const center = vh * 0.46;
    const items = document.querySelectorAll(".quote-item");
    items.forEach((el) => {
      const r = el.getBoundingClientRect();
      const c = r.top + r.height / 2;
      const norm = Math.min(Math.abs(c - center) / (vh * 0.62), 1);
      const eased = norm * norm * (3 - 2 * norm);
      const op = 1 - eased * 0.82;
      const scale = 1 - eased * 0.035;
      const ty = eased * (c < center ? -10 : 10);
      el.style.opacity = op.toFixed(3);
      el.style.transform = `translateY(${ty.toFixed(1)}px) scale(${scale.toFixed(4)})`;
    });
  }

  // ---- three.js gold dust ----
  makeSprite(THREE) {
    const c = document.createElement("canvas");
    c.width = c.height = 64;
    const g = c.getContext("2d");
    const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
    grd.addColorStop(0, "rgba(255,236,196,1)");
    grd.addColorStop(0.25, "rgba(214,178,108,0.85)");
    grd.addColorStop(0.6, "rgba(160,128,70,0.22)");
    grd.addColorStop(1, "rgba(160,128,70,0)");
    g.fillStyle = grd;
    g.fillRect(0, 0, 64, 64);
    const t = new THREE.CanvasTexture(c);
    return t;
  }

  makeLayer(THREE, count, spread, size, opacity, color) {
    const pos = new Float32Array(count * 3);
    const drift = new Float32Array(count);
    const phase = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      pos[i * 3] = (Math.random() - 0.5) * spread;
      pos[i * 3 + 1] = (Math.random() - 0.5) * spread * 0.9;
      pos[i * 3 + 2] = (Math.random() - 0.5) * spread * 0.5;
      drift[i] = 0.12 + Math.random() * 0.4;
      phase[i] = Math.random() * Math.PI * 2;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      size, map: this._sprite, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending, color: new THREE.Color(color), opacity,
    });
    const pts = new THREE.Points(geo, mat);
    pts.userData = { drift, phase, spread };
    return pts;
  }

  initThree() {
    const THREE = window.THREE;
    const canvas = document.getElementById("quote-bg");
    if (!THREE || !canvas) {
      this._poll = setTimeout(() => this.initThree(), 140);
      return;
    }
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    let w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(62, w / h, 0.1, 120);
    cam.position.z = 16;

    this._sprite = this.makeSprite(THREE);
    const far = this.makeLayer(THREE, 520, 46, 0.16, 0.5, 0x9c8350);
    const mid = this.makeLayer(THREE, 240, 34, 0.32, 0.72, 0xc1a063);
    const near = this.makeLayer(THREE, 70, 26, 0.62, 0.9, 0xe6c98a);
    scene.add(far, mid, near);
    const layers = [far, mid, near];

    let mx = 0, my = 0, tmx = 0, tmy = 0;
    this._onMove = (e) => {
      tmx = (e.clientX / window.innerWidth - 0.5);
      tmy = (e.clientY / window.innerHeight - 0.5);
    };
    window.addEventListener("pointermove", this._onMove, { passive: true });

    this._onResize = () => {
      w = window.innerWidth; h = window.innerHeight;
      cam.aspect = w / h; cam.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    window.addEventListener("resize", this._onResize);

    const clock = new THREE.Clock();
    const tick = () => {
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;
      layers.forEach((layer, li) => {
        const p = layer.geometry.attributes.position.array;
        const { drift, phase, spread } = layer.userData;
        const top = spread * 0.45;
        for (let i = 0; i < drift.length; i++) {
          const yi = i * 3 + 1;
          p[yi] += drift[i] * dt * (0.6 + li * 0.5);
          p[i * 3] += Math.sin(t * 0.3 + phase[i]) * dt * 0.18;
          if (p[yi] > top) { p[yi] = -top; p[i * 3] = (Math.random() - 0.5) * spread; }
        }
        layer.geometry.attributes.position.needsUpdate = true;
        layer.rotation.z = Math.sin(t * 0.04 + li) * 0.04;
      });
      mx += (tmx - mx) * 0.04;
      my += (tmy - my) * 0.04;
      cam.position.x = mx * 4.2;
      cam.position.y = -my * 3.0;
      cam.lookAt(0, 0, 0);
      renderer.render(scene, cam);
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }
}
</script>
